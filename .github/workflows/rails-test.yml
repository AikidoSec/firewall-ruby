name: 🚂️ Rails tests

on:
  - push
  - workflow_call

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.3"
          - "3.2"
          - "3.1"
          - "3.0"
          - "2.7"
        app:
          - "rails7.2_generic"
        exclude:
          - ruby: "3.0"
            app: "rails7.2_generic"
          - ruby: "2.7"
            app: "rails7.2_generic"

    steps:
    - uses: actions/checkout@v4
    - name: Link the Gemfile for Ruby ${{ matrix.ruby }}
      run: bin/link_gemfile "${{ matrix.ruby }}"
    - name: Set up Ruby
      uses: ruby/setup-ruby@a4effe49ee8ee5b8b5091268c473a4628afb5651 # v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Download libzen
      run: "bundle exec rake libzen:download:current"
    - name: Run the Rails tests
      working-directory: test/e2e/${{ matrix.app }}
      run: |
        bin/setup
        bin/rails test
