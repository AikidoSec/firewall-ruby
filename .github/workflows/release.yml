name: Publish new Release

on:
  release:
    types: [published]

jobs:
  unit-tests:
    name: 🧪 Unit tests
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit
  lint:
    name: 🧹 Lint code
    uses: ./.github/workflows/lint.yml
  e2e:
    name: 🕵️ End to end tests
    uses: ./.github/workflows/e2e.yml
  release:
    runs-on: ubuntu-latest
    name: release-gem

    permissions:
      contents: write
      id-token: write

    needs:
      - unit-tests
      - lint
      - e2e
    steps:
      - uses: actions/checkout@v4
      - name: Configure the latest Gemfile
        run: bin/link_gemfile "$(cat .ruby-version)"
      - name: Set up Ruby
        uses: ruby/setup-ruby@a4effe49ee8ee5b8b5091268c473a4628afb5651 # v1
        with:
          bundler-cache: true
      - uses: rubygems/release-gem@a25424ba2ba8b387abc8ef40807c2c85b96cbe32 # v1
