name: Publish new Release

on:
  release:
    types: [published]

jobs:
  verify-version:
    name: 🔖 Verify tag matches gem version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag against Aikido::Zen::VERSION
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gem_version=$(grep -E '^\s*VERSION\s*=' lib/aikido/zen/version.rb | sed -E 's/.*"([^"]+)".*/\1/')
          expected="v${gem_version}"
          if [ "$TAG" != "$expected" ]; then
            echo "::error::Release tag '$TAG' does not match Aikido::Zen::VERSION ('$gem_version'). Expected tag '$expected'."
            exit 1
          fi
          echo "Tag '$TAG' matches Aikido::Zen::VERSION ('$gem_version')."
  unit-tests:
    name: 🧪 Unit tests
    needs: verify-version
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit
  lint:
    name: 🧹 Lint code
    needs: verify-version
    uses: ./.github/workflows/lint.yml
  e2e:
    name: 🕵️ End to end tests
    needs: verify-version
    uses: ./.github/workflows/e2e.yml
  release:
    runs-on: ubuntu-latest
    name: release-gem

    permissions:
      contents: write
      id-token: write

    needs:
      - verify-version
      - unit-tests
      - lint
      - e2e
    steps:
      - uses: actions/checkout@v4
      - name: Configure the latest Gemfile
        run: bin/link_gemfile "$(cat .ruby-version)"
      - name: Set up Ruby
        uses: ruby/setup-ruby@a4effe49ee8ee5b8b5091268c473a4628afb5651 # v1
        with:
          bundler-cache: true
      - uses: rubygems/release-gem@a25424ba2ba8b387abc8ef40807c2c85b96cbe32 # v1
